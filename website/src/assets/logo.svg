<svg width="140" height="32" viewBox="0 0 140 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flow-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- U shape as data pipe -->
  <path d="M4 6v12a8 8 0 0 0 16 0V6" stroke="url(#flow-gradient)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Flowing dot inside U -->
  <circle cx="12" cy="14" r="2.5" fill="#22d3ee">
    <animate attributeName="cy" values="8;18;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- "uniflow" text -->
  <text x="28" y="22" font-family="Geist Sans, system-ui, sans-serif" font-size="18" font-weight="500" fill="#eeeef0" letter-spacing="-0.02em">
    uni<tspan fill="url(#flow-gradient)">flow</tspan>
  </text>
</svg>
